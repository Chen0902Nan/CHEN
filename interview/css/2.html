<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>高度塌陷示例</title>
    <style>
      /* 父元素样式：设置了一个灰色背景以便观察高度 */
      .parent {
        background-color: #e0e0e0;
        border: 2px solid #333;
        width: 300px;
        /* 注意：这里没有设置高度，也没有清除浮动 */
        overflow: hidden;
      }

      /* 子元素样式：设置了浮动 */
      .child {
        width: 100px;
        height: 100px;
        background-color: #ff6b6b;
        color: white;

        /* 关键属性：浮动导致脱离文档流 */
        float: left;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child">我是浮动的子元素</div>
    </div>

    <p>我是下面的兄弟元素，可以看到我跑到了父元素的上面/里面。</p>
  </body>
</html>
