<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>继承</title>
  </head>
  <body>
    <script>
      function Animal() {
        this.spcies = "动物";
      }
      function Cat(name, color) {
        // 绑定this  this除了可以由运行的时候决定，还可以由调用的时候指定
        console.log(this); // Cat{}
        // apply 用于指定函数运行时this 指向,被绑定了
        // 第一个参数就是指定的this指向
        Animal.apply(this); // 函数运行 指定函数内部的this 是cat实例，将Cat{}传参给Animal
        this.name = name;
        this.color = color;
      }
      // 怎么继承 父类的属性和方法我都要
      const cat = new Cat("加菲猫", "橘色");
      console.log(cat);
    </script>
  </body>
</html>
