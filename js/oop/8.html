<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function Animal() {
        this.species = "动物";
      }
      Animal.prototype = {
        sayHi: function () {
          console.log("呐呐呐呐啦");
        },
      };
      function Cat(name, color) {
        // 绑定this  this除了可以由运行的时候决定，还可以由调用的时候指定
        console.log(this); // Cat{}
        // apply 用于指定函数运行时this 指向,被绑定了
        // 第一个参数就是指定的this指向
        Animal.apply(this); // 函数运行 指定函数内部的this 是cat实例，将Cat{}传参给Animal
        this.name = name;
        this.color = color;
      }
      Cat.prototype = new Animal();
      const cat = new Cat("加菲猫", "橘色");

      console.log(cat, cat.__proto__);
      cat.sayHi();
    </script>
  </body>
</html>
