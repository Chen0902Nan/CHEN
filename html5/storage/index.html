<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalStorage Todos</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <div class="wrapper">
      <h2>LOCAL TAPAS</h2>
      <p></p>
      <ul class="plates">
        <li>Loading Tapas...</li>
      </ul>
      <form class="add-items">
        <input type="text" placeholder="Item Name" required name="item" />
        <input type="submit" value=" Add Item" />
      </form>
    </div>
    <script>
      const addItems = document.querySelector(".add-items");
      const itemsList = document.querySelector(".plates");
      const items = JSON.parse(localStorage.getItem("todos")) || [];
      // 函数式封装 拒绝流程式代码
      // 封装实现的细节，比较难 封装的人和调用的人是不同的 方便后期维护
      // 复用
      // 函数默认值是es6的新特性
      // 流程式的代码超过10行，一定要封装
      function populateList(plates = [], platesList) {
        platesList.innerHTML = plates
          .map((item, index) => {
            return `
            <li>
              <input type="checkbox" data-index=${index} id="item${index}"
                ${item.done ? "checked" : ""}
              />
              <label for="item${index}"> ${item.text}</label>
            </li>
          `;
          })
          .join("");
      }

      function addItem(event) {
        event.preventDefault(); // 阻止默认行为
        // 函数执行时会有this 事件处理函数时 指向事件发生的元素
        const text = this.querySelector("[name=item]").value.trim();
        const item = {
          text,
          done: false,
        };
        items.push(item);
        // 持久化存储 localStorage key=>value 存储
        localStorage.setItem("todos", JSON.stringify(items));
        populateList(items, itemsList);
        // this.querySelector("[name=item]").value = "";
        this.reset();
      }

      function toggleDone(event) {
        const el = event.target;
        console.log(el.tagName);
        if (el.tagName == "INPUT") {
          const index = el.dataset.index;
          items[index].done = !items[index].done;
          localStorage.setItem("todos", JSON.stringify(items));
          populateList(items, itemsList);
        }
      }
      addItems.addEventListener("submit", addItem);
      itemsList.addEventListener("click", toggleDone);
      populateList(items, itemsList);
    </script>
  </body>
</html>
