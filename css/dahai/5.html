<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 首先是个p标签，其次是container第二个孩子 */
    /* p 的父元素，的第n个元素，且要为p */
    /* .container p:nth-child(5){
      background-color: yellow;
    } */

    /* 第n个p */
    .container p:nth-of-type(3){
      background-color: yellow;
      color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>nth-child vs nth-of-type 示例</h1>
    <p>这是一个段落。</p>
    <div>这是一个div。</div>
    <p>这是第二个段落。</p>
    <p>这是第三个段落。</p>
    <div>这是第二个div。</div>
  </div>
</body>
</html>
