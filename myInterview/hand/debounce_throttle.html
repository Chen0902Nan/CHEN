  <body>
    <input type="text" id="debounce" />
    <script>
      const inputUI = document.getElementById("debounce");
      inputUI.addEventListener(
        "input",
        throttle((e) => {
          console.log(e.target.value);
        }, 1000),
      );

      function debounce(func, delay) {
        let timer = null;
        return function (...args) {
          const context = this;
          if (timer) clearTimeout(timer);
          timer = setTimeout(() => {
            func.apply(context, args);
            timer = null;
          }, delay);
        };
      }

      function debounce(func, delay, immediate) {
        let timer = null;
        return function (...args) {
          if (immediate) {
            const context = this;
            const isFirstCall = !timer;
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => {
              timer = null;
            }, delay);
            if (isFirstCall) func.apply(context, args);
          } else {
            const context = this;
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => {
              func.apply(context, args);
              timer = null;
            }, delay);
          }
        };
      }

      function debounce(func, delay, leading = false) {
        let isInvoked = false; //是否执行过
        let trailing = true;
        const debounced = function (...args) {
          return new Promise((resolve, reject) => {
            clearTimeout(timer);
            // 如果我们需要立即执行，并且还没有执行过
            if (leading && !isInvoked) {
              try {
                const result = func.apply(this, args);
                resolve(result);
                isInvoked = true;
              } catch (err) {
                reject(err);
              }
              if (!trailing) return;
            }

            timer = setTimeout(() => {
              try {
                isInvoked = true;
                if (trailing) {
                  const result = func.apply(this, args);
                  resolve(result);
                }
              } catch (err) {
                reject(err);
              }
            });
          });
        };
        // 函数也是对象
        debounced.cancel = function () {
          clearTimeout(timer);
          // 清楚后 需要重新设置
          timer = null;
          isInvoked = false;
        };
        return debounced;
      }

      // function throttle(fun, interval) {

      function throttle(func, interval) {
        let timer = null;
        let lastTime = 0;
        return function (...args) {
          const now = Date.now();
          let remainingTime = interval - (now - lastTime);
          const context = this;
          if (remainingTime <= 0) {
            if (timer) {
              clearTimeout(timer);
              timer = null;
            }
            func.apply(context, args);
            lastTime = Date.now();
          } else {
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => {
              func.apply(context, args);
              lastTime = Date.now();
              timer = null;
            }, remainingTime);
          }
        };
      }
    </script>
