<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拷贝数组</title>
  </head>
  <body>
    <script>
      const arr = [1, 2, 3, 4, 5];
      // const arr2 = arr; // 引用式拷贝
      // 重新申请一块空间 开销大
      const arr2 = JSON.parse(JSON.stringify(arr));
      // 数组的拼接
      const arr3 = [].concat(arr);
      // 展开运算符
      const arr4 = [...arr];
      arr4[0] = 0;
      console.log(arr, arr4);
    </script>
  </body>
</html>
