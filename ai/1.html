    <input type="text" id="debounce" />
    <script>
      const inputUI = document.getElementById("debounce");
      inputUI.addEventListener(
        "input",
        throttle((e) => {
          console.log(e.target.value);
        }, 2d000),
      );

      //     timer = setTimeout(() => {

      function debounce(func, delay, immediate) {
        let timer = null;
        return function (...args) {
          const context = this;
          if (immediate) {
            const isFirstCall = !timer;
            if (timer) clearTimeout(timer);

            timer = setTimeout(() => {
              timer = null;
            }, delay);

            if (isFirstCall) func.apply(context, args);
          } else {
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => {
              func.apply(context, args);
              timer = null;
            }, delay);
          }
        };
      }

      // function throttle(fun, interval) {
      //   let lastTime = 0;
      //   return function (...args) {
      //     const context = this;
      //     const nowTime = Date.now();
      //     if (nowTime - lastTime >= interval) {
      //       fun.apply(context, args);
      //       lastTime = Date.now();
      //     }
      //   };
      // }

      function throttle(fun, interval) {
        let lastTime = 0;
        let timer = null;
        return function (...args) {
          const now = Date.now();
          const remainingTime = interval - (now - lastTime);

          if (remainingTime <= 0) {
            if (timer) {
              clearTimeout(timer);
              timer = null;
            }
            fun.apply(this, args);
            lastTime = Date.now();
          } else {
            if (timer) {
              clearTimeout(timer);
            }
            timer = setTimeout(() => {
              fun.apply(this, args);
              lastTime = Date.now();
              timer = null;
            }, remainingTime);
          }
        };
      }
    </script>
